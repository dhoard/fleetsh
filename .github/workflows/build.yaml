name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: src/go.sum

      - name: Cache goreleaser
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: go-bin-${{ runner.os }}-goreleaser-v2.13.0

      - name: Install goreleaser
        run: command -v goreleaser || go install github.com/goreleaser/goreleaser/v2@v2.13.0

      - name: Build, test, vet, package
        run: ./build-and-package.sh
