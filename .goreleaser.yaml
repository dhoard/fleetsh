version: 2

builds:
  - id: fleetsh
    dir: src
    main: ./cmd/fleetsh
    binary: fleetsh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - "386"
    ldflags:
      - -s -w -X github.com/dhoard/fleetsh/internal/cli.version={{.Env.FLEETSH_VERSION}}

archives:
  - formats: ['tar.gz']
    name_template: "fleetsh_{{ .Env.FLEETSH_VERSION }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICES
      - README.md

checksum:
  name_template: "checksums.txt"
